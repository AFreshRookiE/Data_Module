dolphindb:
  host: "localhost"
  port: 8848
  username: "admin"
  password: "123456"

dolphindb_path: "D:\\dolphinDB\\server\\dolphindb.exe"

schedule_time: "18:00"
fetch_retry_times: 3
fetch_retry_interval: 10
db_retry_times: 3
db_retry_interval: 15

run_log_dir: "logs/run"
error_log_dir: "logs/error"
log_retention_days: 30

db_path: "dfs://etf_db"

tables:
  etf_daily: "etf_daily"
  etf_nav: "etf_nav"
  index_daily: "index_daily"
  adjust_factor: "adjust_factor"
  etf_metadata: "etf_metadata"
  etf_premium: "etf_premium"

tracking_indices:
  - "sh.000300"
  - "sh.000905"
  - "sh.000852"
  - "sh.000016"
  - "sh.000903"
  - "sz.399006"
  - "sz.399673"
  - "sh.000688"
  - "sh.000001"
  - "sz.399001"
  - "sz.399005"
  - "sh.000015"
  - "sh.000688"
  - "sh.000918"

etf_classification_file: "etf_classification.yaml"

export:
  enabled: true
  output_dir: "data/export"
  format: "parquet"

cache_recovery_on_startup: true
