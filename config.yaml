dolphindb:
  host: "localhost"
  port: 8848
  username: "admin"
  password: "123456"   # 可由环境变量 DOLPHINDB__PASSWORD 覆盖

schedule_time: "18:00"       # 每日触发时间，HH:MM 格式
fetch_retry_times: 3         # 数据接口重试次数
fetch_retry_interval: 10     # 数据接口重试间隔（秒）
db_retry_times: 3            # DolphinDB 连接重试次数
db_retry_interval: 15        # DolphinDB 连接重试间隔（秒）

run_log_dir: "logs/run"      # 运行日志目录
error_log_dir: "logs/error"  # 错误日志目录
log_retention_days: 30       # 日志保留天数

db_path: "dfs://etf_db"      # DolphinDB 数据库路径
table_name: "etf_daily"      # DolphinDB 表名
